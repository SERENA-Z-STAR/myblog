# 限流区域定义（必须在server块外）
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=publish:10m rate=2r/s;

# 上游服务定义
upstream blog_app {
    server app:3000;
}

server {
    listen 80;
    server_name zqqqz.xyz localhost;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 直接用主配置里已有的 main 格式，不再重复定义
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Grafana 反向代理
    location /grafana/ {
        proxy_pass http://grafana:3000; # 注意末尾的斜杠，它会自动替换路径
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # 解决 Grafana 登录时的 Cookie 路径问题
        proxy_cookie_path / /grafana/;
    }

    # Prometheus 反向代理（仅建议内网访问，面试时可以展示你做了路径保护）
    location /prometheus/ {
    # 简单的基础认证（可选）：auth_basic "Prometheus Admin";
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
    }
    
    # 首页/通用路由
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://blog_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 发布接口（严格限流）
    location /publish {
        limit_req zone=publish burst=5 nodelay;
        proxy_pass http://blog_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 健康检查接口（不限流）
    location /health {
        proxy_pass http://blog_app;
        access_log off;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        return 404;
    }
}
