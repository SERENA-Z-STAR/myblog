name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - 'docker-compose.yml'
      - '.my.cnf'
      - 'nginx/**'
      - 'prometheus/**'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/myblog

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker images
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:app-${{ github.sha_short }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:app-latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:app-latest
          cache-to: type=inline

      - name: Build and push nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nginx-${{ github.sha_short }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:nginx-latest

      - name: Build and push prometheus image
        uses: docker/build-push-action@v5
        with:
          context: ./prometheus
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prometheus-${{ github.sha_short }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:prometheus-latest

      - name: Create deployment notification
        if: success()
        run: |
          echo "🎉 Build completed successfully!"
          echo "📦 Image pushed to Docker Hub"
          echo "   - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:app-${{ github.sha_short }}"
          echo "   - ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:app-latest"
          echo ""
          echo "🚀 Your VM should automatically update within a few minutes via Watchtower"

      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Build failed! Please check the logs."
